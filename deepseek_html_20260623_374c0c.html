<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌍 2026 World Cup – Interactive Globe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: radial-gradient(ellipse at center, #0a0a20 0%, #000000 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            color: #fff;
            user-select: none;
        }
        #globe-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: relative;
        }

        /* ---- Title ---- */
        #title {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 50px rgba(0, 0, 0, 0.95), 0 0 100px rgba(0, 0, 0, 0.7);
        }
        #title h1 {
            font-size: clamp(1.4rem, 4vw, 3.4rem);
            font-weight: 800;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #f9d976, #f39c12, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 24px rgba(243, 156, 18, 0.25));
        }
        #title p {
            font-size: clamp(0.65rem, 1vw, 1rem);
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.25em;
            margin-top: 2px;
            font-weight: 300;
            text-transform: uppercase;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.6);
        }

        /* ---- Legend ---- */
        #legend {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 10px 26px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 10;
            pointer-events: none;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 8px 50px rgba(0, 0, 0, 0.7);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(0.65rem, 0.9vw, 0.85rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .legend-dot.highlight {
            background: radial-gradient(circle at 30% 30%, #ffd700, #f39c12);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }
        .legend-dot.regular {
            background: radial-gradient(circle at 30% 30%, #1a2a4a, #0a1222);
            border-color: rgba(255, 255, 255, 0.05);
        }
        .legend-count {
            font-size: clamp(0.55rem, 0.75vw, 0.75rem);
            color: rgba(255, 255, 255, 0.35);
            font-weight: 300;
            padding-left: 2px;
        }
        .legend-divider {
            width: 1px;
            height: 26px;
            background: rgba(255, 255, 255, 0.06);
        }

        /* ---- Tooltip ---- */
        #tooltip {
            position: absolute;
            padding: 6px 18px 6px 14px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #fff;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.2s ease;
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #tooltip.visible {
            opacity: 1;
        }
        #tooltip .flag {
            font-size: 1.1rem;
        }

        /* ---- Loading ---- */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: radial-gradient(ellipse at center, #0a0a20 0%, #000 100%);
            transition: opacity 0.9s ease;
            pointer-events: none;
        }
        #loading.hidden {
            opacity: 0;
        }
        #loading .spinner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid rgba(255, 215, 0, 0.08);
            border-top-color: #f39c12;
            animation: spin 0.9s linear infinite;
        }
        #loading p {
            margin-top: 20px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 300;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ---- Responsive ---- */
        @media (max-width: 640px) {
            #legend {
                bottom: 16px;
                padding: 8px 14px;
                gap: 10px;
                border-radius: 28px;
                width: 94%;
                max-width: 400px;
            }
            .legend-item {
                font-size: 0.65rem;
                gap: 6px;
            }
            .legend-dot {
                width: 10px;
                height: 10px;
            }
            .legend-divider {
                display: none;
            }
            #title {
                top: 14px;
            }
            #tooltip {
                font-size: 0.75rem;
                padding: 4px 12px 4px 10px;
            }
        }
        @media (max-width: 400px) {
            #legend {
                gap: 6px;
                padding: 6px 10px;
            }
            .legend-item {
                font-size: 0.55rem;
                gap: 4px;
            }
            .legend-dot {
                width: 8px;
                height: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading Globe …</p>
    </div>

    <!-- Title -->
    <div id="title">
        <h1>🏆 2026 FIFA World Cup</h1>
        <p>48 nations · one dream</p>
    </div>

    <!-- Tooltip -->
    <div id="tooltip"></div>

    <!-- Legend -->
    <div id="legend">
        <span class="legend-item">
            <span class="legend-dot highlight"></span>
            Participating
            <span class="legend-count">(48)</span>
        </span>
        <span class="legend-divider"></span>
        <span class="legend-item">
            <span class="legend-dot regular"></span>
            Other Nations
        </span>
        <span class="legend-divider"></span>
        <span class="legend-item" style="font-weight:300;color:rgba(255,255,255,0.3);font-size:0.65rem;">
            🖱 Drag · Scroll
        </span>
    </div>

    <!-- Globe Container -->
    <div id="globe-container"></div>

    <!-- ============ SCRIPTS ============ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.24.0/dist/globe.gl.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js">
    </script>

    <script>
        // ============================================================
        //  1.  WORLD CUP 2026 – QUALIFIED NATIONS (48)
        //     Based on official qualification as of June 2026
        // ============================================================
        const WC2026 = new Set([

            // —— HOSTS (3) ——
            'United States of America',
            'Canada',
            'Mexico',

            // —— CONMEBOL (6) ——
            'Argentina',
            'Brazil',
            'Uruguay',
            'Ecuador',
            'Colombia',
            'Paraguay',

            // —— UEFA (16) ——
            'France',
            'England',
            'Spain',
            'Germany',
            'Portugal',
            'Netherlands',
            'Belgium',
            'Croatia',
            'Italy',
            'Switzerland',
            'Denmark',
            'Austria',
            'Serbia',
            'Poland',
            'Ukraine',
            'Sweden',

            // —— AFC (8) ——
            'Japan',
            'Korea',
            'Iran',
            'Australia',
            'Saudi Arabia',
            'Qatar',
            'United Arab Emirates',
            'Iraq',

            // —— CAF (9) ——
            'Morocco',
            'Senegal',
            'Nigeria',
            'Egypt',
            'Ghana',
            'Cameroon',
            "Côte d'Ivoire",
            'Algeria',
            'South Africa',

            // —— CONCACAF (3 additional, hosts already counted) ——
            'Costa Rica',
            'Jamaica',
            'Panama',

            // —— OFC (1) ——
            'New Zealand',

            // —— Playoff winners (2) ——
            'Peru',
            'Chile'
        ]);

        // Name overrides for GeoJSON mismatches
        const nameMap = {
            'United States': 'United States of America',
            'USA': 'United States of America',
            'South Korea': 'Korea',
            'Republic of Korea': 'Korea',
            'North Korea': "Democratic People's Republic of Korea",
            'Czechia': 'Czech Republic',
            'Macedonia': 'North Macedonia',
            'Ivory Coast': "Côte d'Ivoire",
            'Congo': 'Republic of the Congo',
            'DR Congo': 'Democratic Republic of the Congo',
            'Tanzania': 'United Republic of Tanzania',
            'Syria': 'Syrian Arab Republic',
            'Venezuela': 'Venezuela (Bolivarian Republic of)',
            'Bolivia': 'Bolivia (Plurinational State of)',
            'Russia': 'Russian Federation',
            'Moldova': 'Republic of Moldova',
            'Palestine': 'State of Palestine',
            'Vietnam': 'Viet Nam',
            'Brunei': 'Brunei Darussalam',
            'Cabo Verde': 'Cape Verde',
            'Central African Republic': 'Central African Republic',
            'Comoros': 'Union of the Comoros',
            'Eswatini': 'eSwatini',
        };

        function normalizeName(name) {
            if (!name) return '';
            const trimmed = name.trim();
            return nameMap[trimmed] || trimmed;
        }

        // ============================================================
        //  2.  INIT GLOBE
        // ============================================================
        const container = document.getElementById('globe-container');

        const globe = new Globe()
            .globeImageUrl('https://unpkg.com/three-globe@2.24.8/example/img/earth-blue-marble.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe@2.24.8/example/img/earth-topology.png')
            .showGlobe(true)
            .showAtmosphere(true)
            .atmosphereColor('#3a6ea5')
            .atmosphereAltitude(0.18)
            .showGraticules(true)
            .graticulesColor('rgba(255,255,255,0.06)')
            .graticulesDashLength(0.5)
            .graticulesDashGap(0.3)
            .backgroundBlur(0.3)
            .backgroundColor('rgba(0,0,0,0)');

        container.appendChild(globe.domElement);

        // ---- Controls ----
        const controls = globe.controls();
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.rotateSpeed = 0.5;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.7;
        controls.minDistance = 180;
        controls.maxDistance = 550;
        controls.enablePan = false;

        // ============================================================
        //  3.  LOAD & RENDER POLYGONS
        // ============================================================
        const DATA_URL = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json';

        async function loadData() {
            const loadingEl = document.getElementById('loading');
            try {
                // Fetch TopoJSON
                const res = await fetch(DATA_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const topology = await res.json();

                // Convert to GeoJSON using topojson-client
                const features = topojson.feature(topology, topology.objects.countries).features;

                // Attach WC flag and normalized names
                const enriched = features.map((feat) => {
                    const raw = feat.properties?.name || '';
                    const norm = normalizeName(raw);
                    const isWC = WC2026.has(norm);
                    return {
                        ...feat,
                        properties: {
                            ...feat.properties,
                            name: norm,
                            wc2026: isWC,
                        },
                    };
                });

                // ---- Render polygons ----
                globe
                    .polygonsData(enriched)
                    .polygonCapColor((d) => {
                        const isWC = d.properties?.wc2026 || false;
                        return isWC ? '#f5b80a' : '#14203a';
                    })
                    .polygonSideColor(() => 'rgba(255,255,255,0.02)')
                    .polygonStrokeColor((d) => {
                        const isWC = d.properties?.wc2026 || false;
                        return isWC ? 'rgba(255,215,0,0.2)' : 'rgba(255,255,255,0.03)';
                    })
                    .polygonAltitude((d) => {
                        const isWC = d.properties?.wc2026 || false;
                        return isWC ? 0.015 : 0.002;
                    })
                    .polygonLabel((d) => {
                        const isWC = d.properties?.wc2026 || false;
                        if (!isWC) return null;
                        const name = d.properties?.name || '';
                        return `<div style="font-weight:600;font-size:1.1rem;color:#fff;text-shadow:0 2px 30px rgba(0,0,0,0.95);background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);padding:6px 18px;border-radius:30px;border:1px solid rgba(255,215,0,0.15);letter-spacing:0.02em;">
                                    ⚽ ${name}
                                </div>`;
                    })
                    .onPolygonHover((d, prevD, event) => {
                        const tooltip = document.getElementById('tooltip');
                        if (!d || !d.properties?.wc2026) {
                            tooltip.classList.remove('visible');
                            globe.domElement.style.cursor = 'default';
                            return;
                        }
                        const name = d.properties.name || '';
                        tooltip.innerHTML = `<span class="flag">⚽</span> ${name}`;
                        tooltip.classList.add('visible');
                        globe.domElement.style.cursor = 'pointer';

                        // Position
                        const x = event.clientX || event.pageX || 0;
                        const y = event.clientY || event.pageY || 0;
                        let left = x + 18;
                        let top = y - 12;
                        const tw = tooltip.offsetWidth || 140;
                        const th = tooltip.offsetHeight || 40;
                        if (left + tw + 20 > window.innerWidth) left = x - tw - 18;
                        if (top + th + 20 > window.innerHeight) top = y - th - 10;
                        if (top < 10) top = 10;
                        tooltip.style.left = left + 'px';
                        tooltip.style.top = top + 'px';
                    })
                    .onPolygonClick((d) => {
                        if (!d || !d.properties?.wc2026) return;
                        const name = d.properties.name || '';
                        const tooltip = document.getElementById('tooltip');
                        tooltip.innerHTML = `<span class="flag">🏆</span> ${name} · Qualified!`;
                        tooltip.classList.add('visible');
                        setTimeout(() => {
                            tooltip.classList.remove('visible');
                        }, 1200);
                    });

                // ---- Hide loading ----
                loadingEl.classList.add('hidden');

                // ---- Auto-rotate resume after interaction ----
                setTimeout(() => { controls.autoRotate = true; }, 600);

                // ---- Interaction pauses auto-rotate ----
                const pauseAutoRotate = () => {
                    controls.autoRotate = false;
                    clearTimeout(window._rotateTimer);
                    window._rotateTimer = setTimeout(() => {
                        controls.autoRotate = true;
                    }, 4000);
                };
                globe.domElement.addEventListener('mousedown', pauseAutoRotate);
                globe.domElement.addEventListener('touchstart', pauseAutoRotate);

                // ---- Resize ----
                window.addEventListener('resize', () => {
                    globe.domElement.style.width = '100%';
                    globe.domElement.style.height = '100%';
                });

                console.log(`✅ World Cup 2026: ${WC2026.size} nations rendered.`);

            } catch (err) {
                console.error('❌ Globe load error:', err);
                loadingEl.innerHTML = `
                            <p style="color:rgba(255,200,100,0.8);text-align:center;max-width:320px;line-height:1.6;">
                                ⚠️ Could not load map data.<br>
                                <span style="font-size:0.75rem;opacity:0.5;">Please check your connection or refresh.</span>
                            </p>
                        `;
                // Still hide after a moment so the user can see the error
                setTimeout(() => { loadingEl.classList.add('hidden'); }, 3000);
            }
        }

        loadData();

        // ============================================================
        //  4.  STARS BACKGROUND
        // ============================================================
        setTimeout(() => {
            const scene = globe.scene();
            if (!scene) return;
            const starGeo = new THREE.BufferGeometry();
            const count = 2200;
            const pos = new Float32Array(count * 3);
            for (let i = 0; i < count * 3; i++) {
                pos[i] = (Math.random() - 0.5) * 2400;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const starMat = new THREE.PointsMaterial({
                color: 0x8899bb,
                size: 0.3,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true,
            });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);
        }, 200);

        // ============================================================
        //  5.  KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R' || e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                controls.autoRotate = !controls.autoRotate;
            }
        });

        // ============================================================
        //  6.  LOG QUALIFIED TEAMS
        // ============================================================
        console.log('🏆 2026 World Cup Qualified Nations:');
        console.log([...WC2026].sort().join('\n'));
    </script>
</body>
</html>
